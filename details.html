<!DOCTYPE html>
<html lang="en">
<head>
    <title>iScalePro | Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 card p-4 shadow">
                <h3 class="text-primary mb-4">Student Information</h3>
                <form action="verify.html">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" required placeholder="Enter your name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" required placeholder="+91 XXXX-XXXXXX">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Select Course</label>
                        <select class="form-select">
                            <option>Data Analytics</option>
                            <option>Web Development</option>
                            <option>Cloud Computing</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Next: Verify Email</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

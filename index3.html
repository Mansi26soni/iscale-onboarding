<!DOCTYPE html>
<html>
<head>
    <title>iScalePro Onboarding</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 400px;">
        <div class="card p-4 shadow">
            <h3 class="text-primary">iScalePro Signup</h3>
            <p class="text-muted">Seamless Student Onboarding</p>
            <hr>

            <div id="step1">
                <label class="form-label">Enter Email</label>
                <input type="email" id="user_email" class="form-control" placeholder="student@example.com">
                <button class="btn btn-primary mt-3 w-100" onclick="sendOTP()">Send OTP</button>
            </div>

            <div id="step2" style="display:none;">
                <p class="alert alert-info">We sent a code to your email!</p>
                <label class="form-label">Enter 6-Digit OTP</label>
                <input type="text" id="otp_input" class="form-control" maxlength="6">
                <button class="btn btn-success mt-3 w-100" onclick="verifyOTP()">Verify & Register</button>
            </div>

            <div id="step3" style="display:none;" class="text-center">
                <h4 class="text-success">✅ Registration Complete!</h4>
                <p>Welcome to iScalePro.</p>
            </div>
        </div>
    </div>

    <script>
        // Initializing with your Public Key
        emailjs.init("BY2r9tU4zewvyFHcy"); 

        let generatedOTP;

        function sendOTP() {
            const email = document.getElementById("user_email").value;
            if(!email) { alert("Please enter email"); return; }

            // Generate a random 6-digit number
            generatedOTP = Math.floor(100000 + Math.random() * 900000);

            // Sending via your Service and Template IDs
            emailjs.send("service_g2f541j", "template_dbbu4t3", {
                email: email,      
                otp_code: generatedOTP 
            }).then(() => {
                // Switches to OTP input field
                document.getElementById("step1").style.display = "none";
                document.getElementById("step2").style.display = "block";
            }).catch((err) => {
                alert("Email failed to send. Please ensure your EmailJS account is active!");
                console.error("EmailJS Error:", err);
            });
        }

        function verifyOTP() {
            const userOTP = document.getElementById("otp_input").value;
            
            // Check if user input matches the generated code
            if (userOTP == generatedOTP) {
                document.getElementById("step2").style.display = "none";
                document.getElementById("step3").style.display = "block";
            } else {
                alert("Incorrect OTP. Try again!");
            }
        }
    </script>
</body>
</html>
